name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auralis_test
          POSTGRES_USER: auralis
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: --health-cmd='pg_isready -U auralis'
                 --health-interval=5s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd='redis-cli ping'
                 --health-interval=5s --health-timeout=3s --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://auralis:test_password@localhost:5432/auralis_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test_secret_key_for_ci_only_32chars
      OPENAI_API_KEY: sk-fake-key-for-testing
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest tests/ --cov=src --cov-report=xml -v
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: '3.11'
      - run: pip install ruff black
      - run: ruff check src/
      - run: black --check src/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose build
      - run: docker compose up -d
      - run: sleep 15
      - run: curl -f http://localhost:8000/health
      - run: docker compose down
