name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_DB: pitchiq_test
  POSTGRES_USER: pitchiq
  POSTGRES_PASSWORD: testpassword
  DATABASE_URL: postgresql+asyncpg://pitchiq:testpassword@localhost:5432/pitchiq_test
  REDIS_URL: redis://localhost:6379/0
  JWT_SECRET_KEY: ci-test-secret-key-for-github-actions-only
  OPENAI_API_KEY: sk-placeholder
  VECTORSTORE_PATH: vectorstore/

jobs:
  # ─── Tests ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pitchiq_test
          POSTGRES_USER: pitchiq
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pitchiq -d pitchiq_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: make test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff check
        run: ruff check src/

      - name: Black check
        run: black --check src/

  # ─── Docker build + smoke test ────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for docker compose
        run: |
          echo "POSTGRES_PASSWORD=testpassword" > .env
          echo "DATABASE_URL=postgresql+asyncpg://pitchiq:testpassword@localhost:5432/pitchiq" >> .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env
          echo "OPENAI_API_KEY=sk-placeholder" >> .env
          echo "JWT_SECRET_KEY=ci-test-secret-key-for-github-actions-only" >> .env

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for API to be ready
        run: sleep 10

      - name: Health check
        run: curl -f http://localhost:8000/health

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs api

      - name: Tear down
        if: always()
        run: docker compose down -v
