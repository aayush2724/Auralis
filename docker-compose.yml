version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: auralis_postgres
    environment:
      POSTGRES_DB: auralis
      POSTGRES_USER: auralis
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auralis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auralis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auralis API ──────────────────────────────────────────────
  api:
    build: .
    container_name: auralis_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Streamlit Dashboard ──────────────────────────────────────
  dashboard:
    build: .
    container_name: auralis_dashboard
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
  redis_data:
