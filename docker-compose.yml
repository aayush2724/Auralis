services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: auralis_postgres
    environment:
      POSTGRES_DB: pitchiq
      POSTGRES_USER: pitchiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pitchiq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitchiq -d pitchiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auralis_redis
    ports:
      - "6379:6379"
    volumes:
      - pitchiq_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auralis API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auralis_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    restart: unless-stopped

  # ─── Streamlit Dashboard ──────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: auralis_streamlit
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pitchiq_pg_data:
  pitchiq_redis_data:
